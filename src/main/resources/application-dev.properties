# ============================================
# ServerManager - Perfil DESARROLLO (H2)
# ============================================

# ==================== Datasource H2 (file-based, persiste entre reinicios) ====================
spring.datasource.url=jdbc:h2:file:./data/servermanager;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== JPA / Hibernate ====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==================== Carga de data.sql ====================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==================== Consola H2 ====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==================== Logging dev ====================
logging.level.org.example.servermanager=DEBUG
logging.level.org.hibernate.SQL=DEBUG
