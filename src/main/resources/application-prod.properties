# ============================================
# ServerManager - Perfil PRODUCCION (PostgreSQL + Render)
# ============================================

# ==================== Server ====================
# Render asigna un puerto dinamico via $PORT
server.port=${PORT:8085}

# ==================== Datasource PostgreSQL (Aiven) ====================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/servermanager}
spring.datasource.username=${DATABASE_USERNAME:servermanager}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool optimizado para free tier (max 20 conexiones en Aiven)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# ==================== JPA / Hibernate ====================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==================== Carga de datos inicial ====================
# Cambiar a 'always' la PRIMERA VEZ para cargar seed, luego volver a 'never'
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=${SQL_DEFER_INIT:false}
spring.sql.init.platform=postgresql

# ==================== Logging prod ====================
logging.level.org.example.servermanager=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN

# ==================== CORS ====================
# Ya configurado en CorsConfig.java con allowedOriginPatterns("*")
