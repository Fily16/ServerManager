# ============================================
# ServerManager - Configuracion Comun
# ============================================

spring.application.name=ServerManager
server.port=8085

# Perfil activo por defecto (dev | prod)
spring.profiles.active=dev

# ==================== JPA ====================
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ==================== Jackson ====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima
spring.jackson.default-property-inclusion=non_null

# ==================== Response Compression ====================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# ==================== File Upload ====================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload-dir=./uploads

# ==================== JWT ====================
jwt.secret=c2VydmVybWFuYWdlci1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTI1Ng==
jwt.expiration=86400000

# ==================== Logging ====================
logging.level.org.example.servermanager=INFO
logging.level.org.springframework.web=INFO
